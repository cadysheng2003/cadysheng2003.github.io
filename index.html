<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cady Sheng — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root { --font-display:'Cormorant Garamond',Georgia,serif; --font-body:'Lora',Georgia,serif; --color-text:#2a2a2a; --color-text-light:#888; --page-max-width:960px; --page-padding:40px; }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{-webkit-font-smoothing:antialiased;}
    body{background:#fff;color:var(--color-text);}
    .site-header{max-width:var(--page-max-width);margin:0 auto;padding:40px var(--page-padding) 0;}
    .logo-image{display:block;width:min(620px,90vw);height:auto;margin:0 auto;}
    .tagline{font-family:var(--font-body);font-size:13.5px;font-style:italic;text-align:right;color:var(--color-text-light);margin-top:10px;letter-spacing:0.3px;}
    .collage{max-width:var(--page-max-width);margin:25px auto 0;padding:0 var(--page-padding);}
    .hero-tile{display:block;overflow:hidden;text-decoration:none;color:inherit;margin-bottom:12px;}
    .hero-tile img{display:block;width:100%;height:auto;transition:opacity 0.35s ease,transform 0.45s ease;}
    .hero-tile:hover img{opacity:0.88;transform:scale(1.02);}
    .hero-tile .tile__label{display:block;font-family:var(--font-display);font-size:15px;font-weight:400;text-align:center;padding:7px 0 0;letter-spacing:0.3px;transition:opacity 0.3s;}
    .hero-tile:hover .tile__label{opacity:0.6;}
    .collage-columns{display:flex;gap:12px;align-items:flex-start;}
    .col-left{flex:0 0 36%;display:flex;flex-direction:column;gap:8px;}
    .col-middle{flex:0 0 32.5%;display:flex;flex-direction:column;gap:8px;}
    .col-right{flex:1;display:flex;flex-direction:column;gap:8px;}
    .tile{display:block;overflow:hidden;text-decoration:none;color:inherit;}
    .tile img{display:block;width:100%;height:auto;transition:opacity 0.35s ease,transform 0.45s ease;}
    .tile:hover img{opacity:0.88;transform:scale(1.03);}
    .tile__label{display:block;font-family:var(--font-display);font-size:15px;font-weight:400;text-align:center;padding:7px 0 0;letter-spacing:0.3px;transition:opacity 0.3s;}
    .tile:hover .tile__label{opacity:0.6;}
    .connect-section{max-width:var(--page-max-width);margin:60px auto 0;padding:0 var(--page-padding);text-align:right;}
    .connect-btn{display:inline-block;font-family:var(--font-display);font-size:17px;font-weight:400;color:var(--color-text);text-decoration:none;letter-spacing:0.5px;background:#f7f5f3;padding:14px 32px;}
    .site-footer{max-width:var(--page-max-width);margin:52px auto 0;padding:32px var(--page-padding) 48px;border-top:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:flex-start;gap:40px;}
    .footer-contact p,.footer-copyright p{font-family:var(--font-body);font-size:13px;line-height:2;color:var(--color-text-light);}
    .footer-contact a{color:var(--color-text-light);text-decoration:none;border-bottom:1px solid #ddd;}
    .footer-contact a:hover{color:var(--color-text);}
    .footer-copyright{text-align:right;}
    .fade-in{opacity:0;transform:translateY(12px);animation:fadeUp 0.7s ease forwards;}
    .delay-1{animation-delay:0.15s;}.delay-2{animation-delay:0.3s;}.delay-3{animation-delay:0.45s;}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
    @media(max-width:768px){.collage-columns{flex-wrap:wrap;gap:10px;}.col-left,.col-middle{flex:0 0 48%;}.col-right{flex:0 0 100%;flex-direction:row;}.col-right .tile{flex:1;}.site-footer{flex-direction:column;gap:20px;}.footer-copyright{text-align:left;}}
    @media(max-width:480px){:root{--page-padding:18px;}.logo-image{width:90vw !important;}.tagline{text-align:center;margin-top:8px;}.collage-columns{flex-direction:column;}.col-left,.col-middle,.col-right{flex:0 0 100% !important;flex-direction:column !important;}.col-right{flex-direction:column !important;}.col-right .tile{flex:none !important;width:100% !important;}.connect-section{text-align:center;}}
  </style>
</head>
<body>

  <header class="site-header fade-in">
    <img src="homepage-covers-images/CadyShengLogo.jpg" alt="Cady Sheng" class="logo-image">
    <p class="tagline">Truth, Love, Flow, Oneness</p>
  </header>

  <section class="collage fade-in delay-2">
    <!-- Hero: Illustrations full width -->
    <a href="illustrations.html" class="hero-tile">
      <img src="homepage-covers-images/IllustrationsCover.jpg" alt="Illustrations" loading="lazy">
      <span class="tile__label">Illustrations</span>
    </a>
    <div class="collage-columns">
      <div class="col-left">
        <a href="stage-art-production.html" class="tile">
          <img src="homepage-covers-images/SPCover.jpg" alt="Stage Art &amp; Production" loading="lazy">
          <span class="tile__label">Stage Art &amp; Production</span>
        </a>
        <a href="graphic-design.html" class="tile">
          <img src="homepage-covers-images/GDCover.jpg" alt="Graphic Design" loading="lazy">
          <span class="tile__label">Graphic Design</span>
        </a>
        <a href="apparel.html" class="tile">
          <img src="homepage-covers-images/ACover.jpg" alt="Apparel" loading="lazy">
          <span class="tile__label">Apparel</span>
        </a>
        <a href="flow-and-spirituality.html" class="tile">
          <img src="homepage-covers-images/SCover.jpg" alt="Flow &amp; Spirituality" loading="lazy">
          <span class="tile__label">Flow &amp; Spirituality</span>
        </a>
      </div>
      <div class="col-middle">
        <a href="my-partner.html" class="tile">
          <img src="homepage-covers-images/MPCover.jpg" alt="My Partner" loading="lazy">
          <span class="tile__label">My Partner</span>
        </a>
        <a href="traditional-mediums.html" class="tile">
          <img src="homepage-covers-images/TMCover.jpg" alt="Traditional Mediums" loading="lazy">
          <span class="tile__label">Traditional Mediums</span>
        </a>
        <a href="meditation.html" class="tile">
          <img src="homepage-covers-images/MCover.jpg" alt="Meditation" loading="lazy">
          <span class="tile__label">Meditation</span>
        </a>
      </div>
      <div class="col-right">
        <a href="childrens-book.html" class="tile">
          <img src="homepage-covers-images/CBCover.jpg" alt="Children&#8217;s Book" loading="lazy">
          <span class="tile__label">Children&#8217;s Book</span>
        </a>
        <a href="jewelry.html" class="tile">
          <img src="homepage-covers-images/JCover.jpg" alt="Jewelry" loading="lazy">
          <span class="tile__label">Jewelry</span>
        </a>
      </div>
    </div>
  </section>

  <section class="connect-section fade-in delay-3">
    <a href="#footer" class="connect-btn">Let&#8217;s Connect</a>
  </section>

  <div id="footer"></div>

  <script src="footer.js"></script>
</body>
</html>
